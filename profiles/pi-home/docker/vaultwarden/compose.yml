services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - 8080:80
    volumes:
      - ./data:/data
    environment:
      - DOMAIN=http://${PI_HOME_IP:-localhost}:8080
      - SIGNUPS_ALLOWED=true       # Nach erstem Account auf false setzen!
      - ADMIN_TOKEN=${VW_ADMIN_TOKEN:-}
      - LOG_LEVEL=warn